in:0;color:#aeb6c5;line-height:1.5;font-size:14px}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}.tag{font-size:11px;color:#cbd5e1;border:1px solid rgba(255,255,255,.045);background:rgba(255,255,255,.038);border-radius:999px;padding:4px 7px}.tag.safe{color:#a7f3d0;border-color:rgba(16,185,129,.24);background:rgba(16,185,129,.08)}.tag.warn{color:#fde68a;border-color:rgba(251,191,36,.24);background:rgba(251,191,36,.08)}.actions{display:flex;gap:8px;position:relative;z-index:1}.send{flex:1;padding:10px 12px;background:rgba(113,112,255,.20);border-color:rgba(113,112,255,.34);font-weight:700}.copy{padding:10px 12px;color:#cbd5e1}.palette{width:min(720px,calc(100% - 20px));border:0;padding:0;background:transparent;color:var(--text)}.palette::backdrop{background:rgba(0,0,0,.72);backdrop-filter:blur(12px)}.pshell{border-radius:26px;padding:14px}.phead{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 12px}.results{display:grid;gap:8px;max-height:min(58vh,520px);overflow:auto;padding-right:2px}.row{display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:10px;align-items:center;padding:10px;border-radius:16px;border:1px solid transparent;background:rgba(255,255,255,.035);text-align:left}.row:hover{border-color:var(--border);background:rgba(255,255,255,.065)}.row .icon{width:34px;height:34px;border-radius:11px;font-size:16px}.row strong{display:block;font-size:14px}.row small{color:var(--soft);font-family:"JetBrains Mono",monospace;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bottom{position:fixed;left:max(10px,env(safe-area-inset-left));right:max(10px,env(safe-area-inset-right));bottom:calc(10px + env(safe-area-inset-bottom));z-index:30;display:none;justify-content:space-around;padding:8px;border-radius:24px}.bottom button{border:0;background:transparent;color:#8a93a3;border-radius:16px;padding:8px 13px;display:grid;gap:2px;place-items:center;min-width:64px}.bottom button span{font-size:11px}.bottom bu <body>
  <div class="shell">
    <header class="top glass">
      <button class="brand" id="homeBtn" type="button"><span class="mark">♥</span><span><strong>Айрин</strong><small>RedNET Control</small></span></button>
      <div class="topActions"><button class="pill" id="tgBtn" type="button">◐</button><button class="cta" data-palette type="button">⌘K</button></div>
    </header>
    <main>
      <section class="hero glass">
        <div><div class="eyebrow"><span class="pulse"></span>observe-first · быстрый запуск</div><h1>Пульт быстрых команд для Hermes / RedNET</h1><p>Красивый MiniApp-лаунчер: поиск команд, избранное, безопасные сценарии и отправка в Telegram WebApp-контур без лишней возни.</p><div class="heroBtns"><button class="primary" data-palette type="button">Открыть палитру</button><button class="secondary" id="statusBtn" type="button">Скопировать /status</button></div></div>
        <div class="signal"><div class="orb"><span></span></div><div class="metrics"><div><small>режим</small><strong>Safe</strong></div><div><small>доступ</small><strong>1 tap</strong></div><div><small>команд</small><strong id="commandCount">—</strong></div><div><small>избранное</small><strong id="favCount">0</strong></div></div></div>
      </section>
      <section class="quick" id="quick"></section>
      <section class="work"><aside class="side glass"><div class="title"><span>Категории</span><small id="visibleCount">—</small></div><nav class="cats" id="cats"></nav></aside><section class="commands glass"><div class="toolbar"><label class="search"><span>⌕</span><input id="search" type="search" autocomplete="off" placeholder="Найти команду, сценарий, модуль…"><kbd>/</kbd></label><button class="chip active" data-filter="all" type="button">Все</button><button class="chip" data-filter="favorite" type="button">★</button><button class="chip" data-filter="safe" type="button">Safe</button></div><div class="list" id="list"></div></section></section>
    </main>
    <nav class="bottom glass"><button data-cat="Главная" class="active" type="button">⌂<span>Главная</span></button><button data-cat="Hermes" type="button">✦<span>Hermes</span></button><button data-cat="RedNET" type="button">◇<span>RedNET</span></button><button data-palette type="button">⌘<span>Поиск</span></button></nav>
  </div>
  <dialog class="palette" id="palette"><div class="pshell glass"><div class="phead"><strong>Командная палитра</strong><button class="pill" id="closePalette" type="button">×</button></div><label class="search"><span>⌕</span><input id="psearch" type="search" autocomplete="off" placeholder="Например: cron, voice, status, почта…"><kbd>Esc</kbd></label><div class="results" id="results"></div></div></dialog>
  <div class="toast" id="toast"></div>
  <script>
    const tg=window.Telegram?.WebApp;const commands=[
      ['status','Hermes','◌','Статус сессии','/status','Показать профиль, модель, состояние сессии и базовую телеметрию.',['safe','info'],'safe'],
      ['commands','Hermes','⌁','Список команд','/commands','Быстро открыть справочник доступных slash-команд в gateway.',['safe','help'],'safe'],
      ['help','Hermes','?','Помощь Hermes','/help','Краткая помощь по текущему чату и доступным возможностям.',['safe'],'safe'],
      ['agents','Hermes','✦','Активные агенты','/agents','Посмотреть активные задачи, фоновые процессы и дочерние агенты.',['safe','ops'],'safe'],
      ['fast','Hermes','⚡','Быстрый режим','/fast','Переключить приоритетную/быструю обработку, когда нужен резкий отклик.',['toggle'],'safe'],
      ['new','Hermes','↻','Новая сессия','/new','Начать чистую сессию, не трогая системные настройки.',['session'],'safe'],
      ['model','Настройки','◐','Модель','/model','Показать или сменить модель в текущем интерфейсе Hermes.',['config'],'caution'],
      ['tools','Настройки','▦','Инструменты','/tools','Открыть управление toolset’ами. Изменения обычно применяются после новой сессии.',['config'],'caution'],
      ['skills','Настройки','◇','Навыки','/skills','Поиск, установка и загрузка навыков Hermes.',['skills'],'safe'],
      ['voice-tts','Настройки','◉','Голос всегда','/voice tts','Включить TTS-ответы в текущем gateway-чате.',['voice','toggle'],'safe'],
      ['voice-off','Настройки','◌','Голос выкл','/voice off','Выключить голосовой режим в текущем чате.',['voice','toggle'],'safe'],
      ['profile','Настройки','◍','Профиль','/profile','Показать активный Hermes-профиль и контекст gateway.',['profile'],'safe'],
      ['cron','Автоматизация','◷','Cron-задачи','/cron','Управление расписаниями: дайджесты, сторожи, напоминания, пайплайны.',['schedule'],'caution'],
      ['goal','Автоматизация','◎','Статус цели','/goal status','Проверить standing goal — работает ли Hermes над длительной целью.',['goal'],'safe'],
      ['background','Автоматизация','⇢','Фоновая задача','/background ','Шаблон для запуска фоновой задачи: после команды допиши точный prompt.',['template'],'caution'],
      ['queue','Автоматизация','☰','Очередь','/queue ','Поставить следующий запрос в очередь без перебивания текущей работы.',['template'],'safe'],
      ['kanban','Автоматизация','▤','Kanban','/kanban tasks','Открыть очередь многопрофильной работы, если board включён.',['team'],'safe'],
      ['rednet-kb','RedNET','◆','Спросить память RedNET','Айрин, найди в RedNET KB: ','Шаблон запроса к базе знаний/памяти RedNET без вывода секретов.',['kb','template'],'safe'],
      ['rednet-network','RedNET','⌬','Сеть RedNET','Айрин, безопасно проверь состояние RedNET-сети и ничего не меняй.','Observe-only проверка сети: маршруты, доступность узлов, без изменений.',['network','observe'],'safe'],
      ['rednet-modules','RedNET','▣','Модули RedNET','Айрин, покажи карту доступных RedNET-модулей и что из них сейчас безопасно трогать.','Быстрый обзор функций/модулей с приоритетом безопасности.',['modules'],'safe'],
      ['home-status','Дом','⌂','Дом / HA статус','Айрин, проверь состояние Home Assistant и перечисли только важное.','Короткий статус умного дома через доступные HA-инструменты.',['home','safe'],'safe'],
      ['work-mail','Работа','✉','Почта / задачи','Айрин, аккуратно разбери рабочую почту и рабочую папку, без печати секретов.','Старт безопасного myradius/email workflow с приватностью.',['work','mail'],'caution'],
      ['digest','RedNET','☄','Дайджест ИТ/ИБ','Айрин, собери короткий RedNET-дайджест ИТ/ИБ с источниками.','Быстрый запуск новостного дайджеста с ссылками.',['research'],'safe'],
      ['media','Медиа','♪','Музыка / присутствие','Айрин, включи мягкое музыкальное присутствие, если доступно и безопасно.','Шаблон для уютного медиа-действия с проверкой доступности.',['media'],'safe'],
      ['restart','Опасная зона','⏻','Перезапуск gateway','/restart','Только по явному разрешению Ивана. В Telegram лучше использовать безопасный внешний запускатель.',['danger'],'danger']
    ].map(([id,category,icon,title,command,description,tags,safety])=>({id,category,icon,title,command,description,tags,safety}));
    const state={cat:'Главная',filter:'all',q:'',fav:new Set(JSON.parse(localStorage.getItem('rednet-miniapp-favorites')||'[]'))};
    const $=id=>document.getElementById(id);const els={quick:$('quick'),cats:$('cats'),list:$('list'),count:$('commandCount'),fav:$('favCount'),visible:$('visibleCount'),search:$('search'),palette:$('palette'),psearch:$('psearch'),results:$('results'),toast:$('toast')};
    function isTelegram(){return !!(tg&&(tg.initData||(tg.initDataUnsafe&&Object.keys(tg.initDataUnsafe).length)||(tg.platform&&tg.platform!=='unknown')))}
    function boot(){if(tg){try{tg.ready();tg.expand()}catch{} if(isTelegram())document.body.classList.add('telegram')}}
    function saveFav(){localStorage.setItem('rednet-miniapp-favorites',JSON.stringify([...state.fav]));els.fav.textContent=state.fav.size}
    function cats(){const m=new Map();commands.forEach(c=>m.set(c.category,(m.get(c.category)||0)+1));return [['Главная',commands.length],...m.entries()]}
    function visible(src=commands,q=state.q){q=q.trim().toLowerCase();return src.filter(c=>{const cat=state.cat==='Главная'||c.category===state.cat;const f=state.filter==='all'||(state.filter==='favorite'&&state.fav.has(c.id))||(state.filter==='safe'&&c.safety==='safe');const hay=`${c.title} ${c.command} ${c.description} ${c.category} ${c.tags.join(' ')}`.toLowerCase();return cat&&f&&(!q||hay.includes(q))})}
    function tagCls(s){return s==='safe'?'safe':(s==='danger'||s==='caution'?'warn':'')}
    function renderQuick(){els.quick.innerHTML='';[['Статус','здоровье Hermes','◌','status'],['Палитра','поиск команд','⌘','palette'],['Голос','TTS / voice mode','◉','voice-tts'],['Задачи','agents / cron / goal','✦','agents']].forEach(([t,s,i,id])=>{let b=document.createElement('button');b.className='qcard';b.type='button';b.innerHTML=`<span class="qicon">${i}</span><span><strong>${t}</strong><br><small>${s}</small></span>`;b.onclick=()=>id==='palette'?openPalette():run(commands.find(c=>c.id===id));els.quick.appendChild(b)})}
    function renderCats(){els.cats.innerHTML='';cats().forEach(([name,count])=>{let b=document.createElement('button');b.type='button';b.className='cat '+(state.cat===name?'active':'');b.innerHTML=`<span>${name}</span><small>${count}</small>`;b.onclick=()=>{state.cat=name;document.querySelectorAll('.bottom button').forEach(x=>x.classList.toggle('active',x.dataset.cat===name));render(false)};els.cats.appendChild(b)})}
    function card(c){let n=document.createElement('article');n.className='card';n.innerHTML=`<button class="fav ${state.fav.has(c.id)?'active':''}" type="button">${state.fav.has(c.id)?'★':'☆'}</button><div class="head"><span class="icon">${c.icon}</span><div><h3>${c.title}</h3><small>${c.command}</small></div></div><p>${c.description}</p><div class="meta"><span class="tag ${tagCls(c.safety)}">${c.safety}</span>${c.tags.slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}</div><div class="actions"><button class="send" type="button">Отправить</button><button class="copy" type="button">Копировать</button></div>`;n.querySelector('.fav').onclick=e=>{e.stopPropagation();state.fav.has(c.id)?state.fav.delete(c.id):state.fav.add(c.id);saveFav();renderList();toast(state.fav.has(c.id)?'Добавила в избранное':'Убрала из избранного')};n.querySelector('.send').onclick=()=>run(c);n.querySelector('.copy').onclick=()=>copyCmd(c);n.ondblclick=()=>run(c);return n}
    function renderList(){let list=visible();els.list.innerHTML='';els.visible.textContent=`${list.length} / ${commands.length}`;if(!list.length){els.list.innerHTML='<div class="card"><div class="head"><span class="icon">∅</span><div><h3>Ничего не нашлось</h3><small>попробуй другой запрос</small></div></div><p>Команды можно искать по названию, категории, тегам и тексту slash-команды.</p></div>';return}list.forEach(c=>els.list.appendChild(card(c)))}
    function renderPalette(){let q=els.psearch.value.trim().toLowerCase();let list=commands.filter(c=>`${c.title} ${c.command} ${c.description} ${c.category} ${c.tags.join(' ')}`.toLowerCase().includes(q)).slice(0,30);els.results.innerHTML='';list.forEach(c=>{let r=document.createElement('button');r.type='button';r.className='row';r.innerHTML=`<span class="icon">${c.icon}</span><span><strong>${c.title}</strong><small>${c.command}</small></span><kbd>${c.category}</kbd>`;r.onclick=()=>{run(c);closePalette()};els.results.appendChild(r)})}
    function render(q=true){els.count.textContent=commands.length;saveFav();if(q)renderQuick();renderCats();renderList();renderPalette()}
    async function copyText(t){try{await navigator.clipboard.writeText(t);return true}catch{let a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();let ok=document.execCommand('copy');a.remove();return ok}}
    function payload(c){return JSON.stringify({source:'rednet-miniapp',type:'command',id:c.id,command:c.command,title:c.title,safety:c.safety,ts:new Date().toISOString()})}
    async function run(c){if(!c)return;if(c.safety==='danger'&&!confirm('Это опасная зона. Отправлять только если Иван явно разрешил. Продолжить?'))return;try{tg?.HapticFeedback?.impactOccurred('light')}catch{}if(isTelegram()&&tg?.sendData){try{tg.sendData(payload(c));toast('Отправила JSON-намерение в Telegram WebApp-контур');return}catch(e){console.warn('Telegram sendData fallback:',e)}}await copyText(payload(c));toast('JSON-намерение скопировано — можно вставить в чат Hermes')}
    async function copyCmd(c){await copyText(c.command);try{tg?.HapticFeedback?.selectionChanged()}catch{}toast('Скопировано: '+c.command)}
    function openPalette(){if(!els.palette.open)els.palette.showModal();els.psearch.value='';renderPalette();requestAnimationFrame(()=>els.psearch.focus())}function closePalette(){if(els.palette.open)els.palette.close()}function toast(m){els.toast.textContent=m;els.toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>els.toast.classList.remove('show'),2100)}
    els.search.oninput=e=>{state.q=e.target.value;renderList()};els.psearch.oninput=renderPalette;document.querySelectorAll('[data-palette]').forEach(b=>b.onclick=openPalette);$('closePalette').onclick=closePalette;document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.toggle('active',x===b));renderList()});document.querySelectorAll('.bottom button[data-cat]').forEach(b=>b.onclick=()=>{state.cat=b.dataset.cat;document.querySelectorAll('.bottom button').forEach(x=>x.classList.toggle('active',x===b));render(false);scrollTo({top:0,behavior:'smooth'})});document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openPalette()}if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();els.search.focus()}if(e.key==='Escape')closePalette()});$('statusBtn').onclick=()=>copyCmd(commands[0]);$('tgBtn').onclick=()=>{boot();toast(isTelegram()?'Telegram WebApp активен':'Локальный режим предпросмотра')};boot();render();
  </script>
</body>
</html>
